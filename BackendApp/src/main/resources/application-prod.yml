spring:
  application:
    name: BackendApp

  cache:
    type: redis

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: PlaceDetailsDatabase

    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: 8050

urls:
  GmapsUrl: ${GMAPS_URL}

apiKeys:
  RapidApiKey: ${RAPID_API_KEY}